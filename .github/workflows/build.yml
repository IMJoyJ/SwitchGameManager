name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            target: aarch64-apple-darwin
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            target: x86_64-apple-darwin
          - platform: 'ubuntu-22.04'
            args: ''
            target: ''
          - platform: 'windows-latest'
            args: ''
            target: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: Client/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        working-directory: Client
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: Client
          tagName: ${{ github.ref_name }}
          releaseName: 'Switch Game Manager ${{ github.ref_name }}'
          releaseBody: |
            ## Switch Game Manager ${{ github.ref_name }}

            ### 安装说明
            - **Windows**：下载 `.msi` 或 `.exe` 安装包
            - **macOS (Apple Silicon)**：下载 `aarch64.dmg`
            - **macOS (Intel)**：下载 `x86_64.dmg`
            - **Linux**：下载 `.AppImage` 或 `.deb`

            ### 使用前提
            需要运行 Switch Game Manager 服务端，详见 [Server/README](Server/) 目录。
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
